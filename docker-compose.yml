services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./apps/web
    env_file: .env
    environment:
      INFERENCE_URL: http://inference:8001
      # Local LLM endpoint for the collection assistant's provider router (SP5).
      # The `ollama` service is opt-in (profile `llm`); harmless when it's down —
      # the router falls back to Claude or the inert "not configured" message.
      OLLAMA_URL: http://ollama:11434
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_healthy
    restart: unless-stopped

  inference:
    build: ./services/inference
    env_file: .env
    environment:
      DATASET_DIR: /data
    volumes:
      - models:/models
      # Read-only card images, so geometric re-ranking (RERANK_TOP_K>0) can load
      # candidate reference images. Harmless when re-ranking is off.
      - ./ml/datasets:/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    # pgvector image = Postgres 16 + the `vector` extension (ANN index for recognition).
    image: pgvector/pgvector:pg16
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  sentinel:
    build: ./services/sentinel
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped

  # MLflow tracking server + model registry (MLOps course stack).
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.0
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0 --port 5000
    ports:
      - "0.0.0.0:5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # One-shot, config-driven training/rebuild job (run on demand):
  #   docker compose run --rm trainer
  trainer:
    build: ./services/trainer
    profiles: ["tools"]
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GIT_PYTHON_REFRESH: quiet
      DATASET_DIR: /data
      PYTHONUNBUFFERED: "1"
    volumes:
      - models:/models
      # Full card-image dataset, downloaded once and reused across trainings.
      # Host path is git-ignored (ml/datasets/*).
      - ./ml/datasets:/data
      # DVC metrics sink (sub-project 4): main.py writes ${METRICS_PATH:-/mlout/
      # metrics.json}, landing a host-visible ml/metrics.json that dvc.yaml's
      # `train` stage declares as a DVC metric. Read-write; harmless otherwise.
      - ./ml:/mlout
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started

  # --- OPT-IN: OCR + Qdrant text-search subsystem (profile `extras`) ---
  # An extra recognition channel: OCR cards -> text -> vector -> Qdrant search.
  # Gated behind `extras` so the default `docker compose up` and CI are unchanged.
  qdrant:
    image: qdrant/qdrant:v1.18.2
    profiles: ["extras"]
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ocr:
    build: ./services/ocr
    profiles: ["extras"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped

  # --- OPT-IN: local LLM serving for the collection assistant (profile `llm`) ---
  # The assistant's provider router (apps/web/lib/llm) can route to a private,
  # cheap local model instead of Claude. Gated behind `llm` so the default
  # `docker compose up` and CI are unchanged. After starting it, pull a model:
  #   docker compose --profile llm up -d ollama
  #   docker compose exec ollama ollama pull llama3.2:1b   # see OLLAMA_MODEL
  ollama:
    image: ollama/ollama
    profiles: ["llm"]
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  caddy_data:
  pgdata:
  models:
  uploads:
  mlflow_data:
  qdrant_storage:
  ollama_models:
