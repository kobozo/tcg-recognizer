services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./apps/web
    env_file: .env
    environment:
      INFERENCE_URL: http://inference:8001
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_healthy
    restart: unless-stopped

  inference:
    build: ./services/inference
    env_file: .env
    volumes:
      - models:/models
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  sentinel:
    build: ./services/sentinel
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped

volumes:
  caddy_data:
  pgdata:
  models:
  uploads:
