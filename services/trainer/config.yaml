# Config-driven pipeline (mirrors the MLOps course's config.yml pattern).
# Any key below can be overridden at run time by the matching UPPER_SNAKE env
# var (e.g. SAMPLE_SIZE, EVAL_CARDS) — handy for baseline sweeps.
game: pokemon
# "all" => index every card in the local dataset manifest (the full downloaded
# catalogue). Set to an integer to cap the run (e.g. a quick subset baseline).
# Falls back to a 30-card live-API sample when no manifest is present.
sample_size: all
# Skip the first N manifest cards before taking `sample_size`. Default 0 = take
# from the start (unchanged). Set >0 (via SAMPLE_OFFSET) to index/eval a card
# range DISJOINT from the learned head's training set — an honest held-out-CARD
# generalization eval (scripts/eval-heldout.sh).
sample_offset: 0
embed_dim: 512    # classical visual descriptor dimensionality (pgvector vector(512))

# --- Realistic synthetic-photo eval harness ---
eval_cards: 500   # distinct indexed cards evaluated (stride-sampled across sets)
eval_views: 3     # synthetic phone-photos generated per card
eval_seed: 1234   # makes the eval reproducible / runs comparable

# --- Geometric re-ranking (sub-project 2) ---
# 0 = off. When >0, the embedding shortlist's top-K is re-ordered by ORB+RANSAC
# homography inliers; the eval then also reports rerank_recall_at_1/@5.
rerank_top_k: 0
